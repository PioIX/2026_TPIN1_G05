<!DOCTYPE html>
<html lang="en">
<head>

<body style="overflow:auto;" id="admin" onload="getUsuario(); llamadoAlSelect(), getPaises()">
    <div class="contenedores">
        <div>
            <h2>Usuarios</h2>
            <div style="width: 100%;">
        
                <input id="correo" type="text" placeholder="Correo">
                <input id="usuario" type="text" placeholder="Usuario">
                <input id="contra" type="text" placeholder="Contraseña">
                
                
                
            </div>
            
            <select id="selectUser">
                
            </select>

    <div class="contenedores" style="align-items: start;">

            <button class="adminBtn" onclick="postPaisData()" >subir</button>
